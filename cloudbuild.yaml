steps:
  # --- BACKEND STEPS ---
  # 1. Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/farmquest-backend',
      './server'
    ]
    id: 'build-backend'

  # 2. Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/farmquest-backend']
    id: 'push-backend'

  # 3. Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'farmquest-backend',
      '--image', 'gcr.io/$PROJECT_ID/farmquest-backend',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--set-env-vars', 'FIREBASE_DATABASE_ID=farmquest,GOOGLE_VERTEX_LOCATION=us-central1,GOOGLE_VERTEX_PROJECT=$PROJECT_ID'
    ]
    id: 'deploy-backend'

  # --- FRONTEND STEPS ---
  # 4. Build frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--build-arg', 'BACKEND_URL=${_BACKEND_URL}',
      '--build-arg', 'NEXT_PUBLIC_API_URL=',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}',
      '--build-arg', 'NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${_FIREBASE_MEASUREMENT_ID}',
      '-t', 'gcr.io/$PROJECT_ID/farmquest-frontend',
      '.'
    ]
    id: 'build-frontend'
    waitFor: ['deploy-backend'] # Wait for backend to be deployed

  # 5. Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/farmquest-frontend']
    id: 'push-frontend'

  # 6. Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'farmquest-frontend',
      '--image', 'gcr.io/$PROJECT_ID/farmquest-frontend',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--set-env-vars', 'BACKEND_URL=${_BACKEND_URL},GOOGLE_VERTEX_LOCATION=us-central1,GOOGLE_VERTEX_PROJECT=$PROJECT_ID'
    ]
    id: 'deploy-frontend'

options:
  machineType: 'E2_HIGHCPU_8'

